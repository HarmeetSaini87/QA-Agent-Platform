<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBorder" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C2FF" />
      <stop offset="100%" stop-color="#22FF88" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer Gradient Border -->
  <path d="M 24 8 L 96 8 L 120 32 L 120 104 Q 120 120 104 120 L 24 120 Q 8 120 8 104 L 8 24 Q 8 8 24 8 Z" fill="url(#gradBorder)" filter="url(#dropShadow)" />

  <!-- Inner Dark Background -->
  <clipPath id="innerClip">
    <path d="M 24 14 L 92 14 L 114 36 L 114 104 Q 114 114 104 114 L 24 114 Q 14 114 14 104 L 14 24 Q 14 14 24 14 Z" />
  </clipPath>
  <rect x="14" y="14" width="100" height="100" fill="#161622" clip-path="url(#innerClip)"/>
  
  <!-- Top Bar (Lighter dark blue) -->
  <rect x="14" y="14" width="100" height="26" fill="#242436" clip-path="url(#innerClip)"/>

  <!-- Window Control Dots -->
  <circle cx="36" cy="27" r="4.5" fill="#FFFFFF"/>
  <circle cx="52" cy="27" r="4.5" fill="#FFFFFF"/>
  <circle cx="68" cy="27" r="4.5" fill="#FFFFFF"/>

  <!-- Shifted Dashed Box (Inner Square) -->
  <!-- Top Left Corner -->
  <path d="M 28 60 L 28 52 Q 28 48 32 48 L 40 48" stroke="#00C2FF" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Top Dash -->
  <line x1="48" y1="48" x2="60" y2="48" stroke="#00C2FF" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Top Right Corner -->
  <path d="M 68 48 L 76 48 Q 80 48 80 52 L 80 60" stroke="#00C2FF" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Right Dash -->
  <line x1="80" y1="66" x2="80" y2="78" stroke="#00C2FF" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bottom Right Corner -->
  <path d="M 80 84 L 80 92 Q 80 96 76 96 L 68 96" stroke="#00C2FF" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Bottom Dash -->
  <line x1="60" y1="96" x2="48" y2="96" stroke="#00C2FF" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bottom Left Corner -->
  <path d="M 40 96 L 32 96 Q 28 96 28 92 L 28 84" stroke="#00C2FF" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Left Dash -->
  <line x1="28" y1="78" x2="28" y2="66" stroke="#00C2FF" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Impact Lines (shifted right, safely contained within the dashed box) -->
  <line x1="54" y1="72" x2="54" y2="62" stroke="#00C2FF" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="47" y1="75" x2="40" y2="68" stroke="#00C2FF" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="44" y1="82" x2="34" y2="82" stroke="#00C2FF" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Small Curly braces {} in the absolute bottom right corner of the dark background -->
  <path d="M 98 94 Q 94 94 94 98 L 94 100 Q 94 102 92 102 Q 94 102 94 104 L 94 106 Q 94 110 98 110" stroke="#22FF88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 102 94 Q 106 94 106 98 L 106 100 Q 106 102 108 102 Q 106 102 106 104 L 106 106 Q 106 110 102 110" stroke="#22FF88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cursor (shifted right, properly inclined with -25 deg rotation, perfectly horizontal bottom edge) -->
  <g transform="translate(54, 82) rotate(-25)">
    <polygon points="0,0 0,22 5,17 10,27 15,29.5 10,19.5 18,18" fill="#000000" opacity="0.4" transform="translate(2,5)"/>
    <polygon points="0,0 0,22 5,17 10,27 15,29.5 10,19.5 18,18" fill="#161622" stroke="#FFFFFF" stroke-width="3.5" stroke-linejoin="round"/>
  </g>
</svg>
