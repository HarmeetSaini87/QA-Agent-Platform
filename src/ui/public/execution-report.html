<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Execution Report — QA Agent Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #059669;
      --primary-lt:   #10b981;
      --primary-dk:   #047857;
      --primary-bg:   #ecfdf5;
      --success:      #22c55e;
      --danger:       #ef4444;
      --warning:      #f59e0b;
      --info:         #3b82f6;
      --dark:         #1e293b;
      --g50:  #f8fafc; --g100: #f1f5f9; --g200: #e2e8f0;
      --g300: #cbd5e1; --g400: #94a3b8; --g500: #64748b;
      --g600: #475569; --g700: #334155;
      --radius: 12px; --radius-sm: 8px;
      --shadow:    0 4px 6px -1px rgb(0 0 0/.1), 0 2px 4px -2px rgb(0 0 0/.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0/.1), 0 4px 6px -4px rgb(0 0 0/.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0/.15), 0 8px 10px -6px rgb(0 0 0/.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      background: linear-gradient(135deg, var(--g100) 0%, var(--primary-bg) 100%);
      min-height: 100vh;
      color: var(--g700);
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    .toolbar {
      background: var(--dark);
      border-bottom: 1px solid var(--g700);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .toolbar-brand { font-size: 13px; font-weight: 700; color: var(--primary-lt); flex: 1; letter-spacing: 0.02em; }
    .toolbar-sub   { font-size: 11px; color: var(--g400); margin-top: 1px; }
    .tbtn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--g600);
      background: var(--g700);
      color: var(--g200);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tbtn:hover { background: var(--g600); border-color: var(--g400); }
    .tbtn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .tbtn-primary:hover { background: var(--primary-lt); border-color: var(--primary-lt); }

    /* ── Hero header ──────────────────────────────────────────────────────── */
    .report-hero {
      background: linear-gradient(135deg, var(--primary) 0%, #0d9488 50%, var(--primary-dk) 100%);
      color: #fff;
      padding: 36px 24px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .report-hero::before {
      content: '';
      position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,.08) 0%, transparent 60%);
      animation: pulse 15s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.1);opacity:.25} }
    .report-hero h1 { font-size: 28px; font-weight: 700; letter-spacing: -.4px; position: relative; text-shadow: 0 2px 4px rgba(0,0,0,.25); }
    .report-hero-sub { margin-top: 6px; font-size: 14px; opacity: .85; position: relative; }

    /* ── Page container ───────────────────────────────────────────────────── */
    .page { max-width: 1280px; margin: 0 auto; padding: 28px 24px 60px; }
    .center-msg { text-align: center; padding: 80px 24px; color: var(--g500); font-size: 14px; }

    /* ── Stats dashboard (TTA-style) ──────────────────────────────────────── */
    .stats-dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 22px 18px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--primary);
      transition: transform .2s, box-shadow .2s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .stat-card.passed { border-left-color: var(--success); }
    .stat-card.failed { border-left-color: var(--danger); }
    .stat-card.skipped{ border-left-color: var(--g400); }
    .stat-card.rate   { border-left-color: var(--info); }
    .stat-val { font-size: 34px; font-weight: 700; color: var(--dark); line-height: 1; }
    .stat-lbl { font-size: 12px; color: var(--g500); text-transform: uppercase; letter-spacing: .5px; margin-top: 6px; font-weight: 600; }

    /* ── Meta strip ───────────────────────────────────────────────────────── */
    .meta-strip {
      background: #fff;
      border-radius: var(--radius);
      padding: 14px 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
    }
    .meta-item { display: flex; align-items: center; gap: 8px; }
    .meta-lbl  { font-size: 11px; color: var(--g500); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .env-pill  {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
      background: linear-gradient(135deg, var(--primary-lt), var(--primary));
      color: #fff; box-shadow: 0 2px 8px rgba(16,185,129,.3);
    }
    .browser-pill {
      background: var(--g100); color: var(--g700);
      border: 1px solid var(--g200);
      display: inline-flex; align-items: center; padding: 4px 12px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .tc-browser-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: .3px;
      white-space: nowrap;
    }
    .tc-browser-badge.br-chromium { background:#4285F4; color:#fff; }
    .tc-browser-badge.br-firefox  { background:#E66000; color:#fff; }
    .tc-browser-badge.br-webkit   { background:#006CFF; color:#fff; }

    /* ── Section titles (kept from original) ──────────────────────────────── */
    .section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--primary-dk);
      margin: 28px 0 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--g200);
      display: flex; align-items: center; gap: 8px;
    }
    .section-title-count {
      font-size: 10px; font-weight: 400; color: var(--g500);
      background: var(--g100); padding: 1px 7px; border-radius: 10px;
      text-transform: none; letter-spacing: 0;
    }

    /* ── Execution summary grid (kept) ────────────────────────────────────── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .summary-item {
      background: #fff;
      border: 1px solid var(--g200);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 3px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .summary-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--g500); }
    .summary-val { font-size: 13px; color: var(--dark); word-break: break-all; font-weight: 500; }

    /* ── Metrics row (kept) ────────────────────────────────────────────────── */
    .metrics-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .metric {
      flex: 1; min-width: 100px;
      background: #fff; border: 1px solid var(--g200);
      border-radius: var(--radius); padding: 18px 12px;
      text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,.04);
      transition: transform .2s, box-shadow .2s;
    }
    .metric:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .metric-val { font-size: 34px; font-weight: 700; color: var(--dark); line-height: 1; }
    .metric-lbl { font-size: 11px; color: var(--g500); margin-top: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .metric-pass .metric-val { color: #16a34a; }
    .metric-fail .metric-val { color: #dc2626; }
    .metric-skip .metric-val { color: #d97706; }
    .metric-rate .metric-val { color: var(--info); }

    /* ── Progress bar (kept) ───────────────────────────────────────────────── */
    .progress-wrap { margin-top: 18px; }
    .progress-bar-bg { background: var(--g200); border-radius: 4px; height: 8px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 4px; background: var(--success); transition: width .5s; }
    .progress-label { font-size: 11px; color: var(--g500); margin-top: 4px; }

    /* ── Status badges ────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; white-space: nowrap; letter-spacing: .3px;
    }
    .badge-pass  { background: linear-gradient(135deg,#22c55e,#16a34a); color:#fff; box-shadow:0 2px 6px rgba(34,197,94,.3); }
    .badge-fail  { background: linear-gradient(135deg,#ef4444,#dc2626); color:#fff; box-shadow:0 2px 6px rgba(239,68,68,.3); }
    .badge-skip  { background: var(--g200); color: var(--g600); }
    .badge-run   { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .badge-done  { background: linear-gradient(135deg,#22c55e,#16a34a); color:#fff; }

    /* ── Filter bar ───────────────────────────────────────────────────────── */
    .filter-bar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .filter-search {
      flex: 1; min-width: 200px; max-width: 340px;
      padding: 8px 12px; border: 1px solid var(--g300);
      border-radius: 20px; font-size: 13px; color: var(--g700);
      background: #fff; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .filter-search:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(5,150,105,.12); }
    .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-pill {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--g300);
      background: #fff; color: var(--g600);
      transition: all .15s;
    }
    .filter-pill:hover { border-color: var(--primary); color: var(--primary); }
    .filter-pill.active { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 2px 6px rgba(5,150,105,.3); }
    .filter-pill.pass-pill.active { background: #16a34a; border-color: #16a34a; }
    .filter-pill.fail-pill.active { background: #dc2626; border-color: #dc2626; }
    .filter-pill.skip-pill.active { background: var(--g500); border-color: var(--g500); }
    .filter-count { font-size: 11px; color: var(--g500); margin-left: auto; white-space: nowrap; }

    /* ── Test case table ──────────────────────────────────────────────────── */
    .tc-table-wrap {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      border: 1px solid var(--g200);
    }
    .tc-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tc-table thead { background: linear-gradient(135deg, var(--dark) 0%, var(--g700) 100%); }
    .tc-table th {
      padding: 12px 14px; text-align: left; font-weight: 600;
      font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
      color: var(--g300); white-space: nowrap; border: none;
    }
    .tc-table td {
      padding: 12px 14px; border-bottom: 1px solid var(--g100);
      vertical-align: middle;
    }
    .tc-table tbody tr.tc-main-row { background: #fff; transition: background .15s; cursor: pointer; }
    .tc-table tbody tr.tc-main-row:nth-child(4n+3) { background: var(--g50); }
    .tc-table tbody tr.tc-main-row:hover { background: var(--primary-bg) !important; }
    .tc-table tbody tr.tc-main-row.failed { border-left: 3px solid var(--danger); }
    .tc-table tbody tr.tc-main-row.passed { border-left: 3px solid transparent; }
    .tc-expand-icon { display: inline-block; width: 18px; color: var(--g400); font-size: 10px; transition: transform .25s; vertical-align: middle; }
    .tc-main-row.open .tc-expand-icon { transform: rotate(90deg); }
    .tc-id-badge {
      display: inline-block; font-family: monospace; font-size: 11px;
      background: #e0e7ff; color: #3730a3;
      border-radius: 4px; padding: 1px 6px; white-space: nowrap;
    }
    /* ── Per-row artifact buttons (Screenshot / Video / Trace) ──────────────── */
    .tc-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: .2px;
      text-decoration: none; cursor: pointer;
      transition: all .15s; white-space: nowrap; border: 1.5px solid transparent;
    }
    /* Screenshot — green */
    .tc-btn-ss  { background: var(--primary-bg); color: var(--primary-dk); border-color: #6ee7b7; }
    .tc-btn-ss:not([disabled]):hover  { background: var(--primary); color: #fff; border-color: var(--primary); }
    /* Video — amber */
    .tc-btn-vid { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .tc-btn-vid:not([disabled]):hover { background: #f59e0b; color: #fff; border-color: #f59e0b; }
    /* Trace — purple */
    .tc-btn-tr  { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; }
    .tc-btn-tr:not([disabled]):hover  { background: #7c3aed; color: #fff; border-color: #7c3aed; }
    /* Inactive (file not captured yet) — greyed, no pointer */
    .tc-btn-inactive {
      background: var(--g100) !important; color: var(--g400) !important;
      border-color: var(--g200) !important; cursor: not-allowed !important;
      opacity: .7;
    }
    .na-pill { font-size: 11px; color: var(--g400); font-style: italic; }

    /* ── Detail expand row ────────────────────────────────────────────────── */
    .tc-detail-row { display: none; background: var(--g50) !important; cursor: default !important; }
    .tc-detail-row.open { display: table-row; }
    .tc-detail-row td { padding: 0 !important; border: none; }
    .tc-detail-inner {
      margin: 12px 20px 16px;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--g200);
    }

    /* ── Collapsible sections inside detail ────────────────────────────────── */
    .det-section { border-bottom: 1px solid var(--g100); }
    .det-section:last-child { border-bottom: none; }
    .det-header {
      padding: 13px 18px; background: var(--g50);
      cursor: pointer; font-weight: 600; font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      transition: background .15s; user-select: none;
      color: var(--g700);
    }
    .det-header:hover { background: var(--g100); }
    .det-arrow { font-size: 11px; color: var(--g400); transition: transform .25s; }
    .det-section.collapsed .det-arrow { transform: rotate(-90deg); }
    .det-section.collapsed .det-body { display: none; }
    .det-body { padding: 16px 20px; }
    .det-header.error-hdr { background: #fef2f2; color: var(--danger); }
    .det-header.error-hdr:hover { background: #fee2e2; }
    .det-header.warn-hdr { background: #fffbeb; color: #92400e; }
    .det-header.warn-hdr:hover { background: #fef3c7; }
    .warn-hdr-note { font-size: 11px; font-weight: 400; opacity: 0.75; margin-left: 8px; }
    .warn-toggle-link { font-size: 11px; color: #92400e; opacity: 0.7; text-decoration: underline dotted; }
    .warn-toggle-link:hover { opacity: 1; }

    /* ── Error section ────────────────────────────────────────────────────── */
    .error-box {
      background: #fef2f2; border: 1px solid #fecaca;
      border-left: 4px solid var(--danger);
      border-radius: var(--radius-sm); padding: 14px 16px;
    }
    .error-msg-line { color: #b91c1c; font-weight: 600; margin-bottom: 10px; font-size: 13px; }
    .error-detail-pre {
      background: var(--dark); color: #fca5a5;
      font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
      font-size: 11.5px; padding: 14px; border-radius: var(--radius-sm);
      white-space: pre-wrap; word-break: break-word;
      max-height: 300px; overflow-y: auto; line-height: 1.55;
    }
    .stack-toggle { margin-top: 10px; }
    .stack-toggle summary { color: var(--g500); font-size: 12px; cursor: pointer; padding: 4px 0; }
    .stack-toggle pre {
      margin-top: 8px; padding: 12px; background: #fffbeb;
      color: #92400e; font-family: monospace; font-size: 11px;
      border-radius: var(--radius-sm); border-left: 3px solid var(--warning);
      max-height: 200px; overflow-y: auto;
    }

    /* ── Screenshots section ──────────────────────────────────────────────── */
    .ss-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .ss-item {
      background: var(--g50); border: 1px solid var(--g200);
      border-radius: var(--radius-sm); overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .ss-item:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .ss-preview { width: 100%; height: 150px; object-fit: cover; display: block; }
    .ss-label {
      padding: 8px 12px; font-size: 11px; font-weight: 600;
      color: var(--g600); border-top: 1px solid var(--g100);
    }
    .diff-strip {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .diff-strip.single { grid-template-columns: 1fr; }
    .diff-col { display: flex; flex-direction: column; gap: 5px; }
    .diff-tag {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em;
    }
    .diff-tag.before { color: var(--info); }
    .diff-tag.after  { color: var(--danger); }
    .diff-col img { width: 100%; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--g200); }
    .diff-col.after-col img { border-color: #fca5a5; }

    /* ── Steps section ────────────────────────────────────────────────────── */
    .steps-list { border: 1px solid var(--g200); border-radius: var(--radius-sm); overflow: hidden; }
    .step-item-wrap { border-bottom: 1px solid var(--g100); }
    .step-item-wrap:last-child { border-bottom: none; }
    .step-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; transition: background .15s;
    }
    .step-row.clickable { cursor: pointer; }
    .step-row.clickable:hover { background: var(--g50); }
    .step-row.fail-step { background: #fef2f2; }
    .step-row.fail-step:hover { background: #fee2e2 !important; }
    .step-exp-icon { width: 16px; font-size: 9px; color: var(--g400); transition: transform .2s; flex-shrink: 0; }
    .step-row.expanded .step-exp-icon { transform: rotate(90deg); }
    .step-status-icon {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .step-status-icon.pass { background: #dcfce7; color: #16a34a; }
    .step-status-icon.fail { background: #fee2e2; color: #dc2626; }
    .step-kw {
      font-size: 11px; font-weight: 700; color: var(--primary-dk);
      background: var(--primary-bg); padding: 2px 7px; border-radius: 4px;
      white-space: nowrap; flex-shrink: 0;
    }
    .step-name { flex: 1; font-size: 12.5px; color: var(--dark); }
    .step-dur  {
      font-size: 11px; font-family: monospace;
      color: var(--g500); background: var(--g100);
      padding: 3px 9px; border-radius: 12px; white-space: nowrap; flex-shrink: 0;
    }
    .step-detail-panel {
      display: none; background: var(--g50);
      border-top: 1px solid var(--g100);
      padding: 12px 14px 12px 64px;
    }
    .step-meta-row { display: flex; flex-wrap: wrap; gap: 16px; font-size: 11px; color: var(--g500); margin-bottom: 8px; }
    .step-ss-thumb { max-height: 120px; border-radius: 4px; border: 1px solid var(--g200); cursor: pointer; }
    .step-err-line  { font-size: 11.5px; color: #b91c1c; font-family: monospace; background: #fef2f2; padding: 8px 10px; border-radius: 4px; border-left: 3px solid var(--danger); }

    /* ── Console errors list (Phase A) ─────────────────────────────────────── */
    .ce-list { display: flex; flex-direction: column; gap: 6px; }
    .ce-row  { font-size: 11.5px; font-family: monospace; color: #92400e; background: #fffbeb;
               padding: 7px 10px; border-radius: 4px; border-left: 3px solid #f59e0b;
               white-space: pre-wrap; word-break: break-all; }

    /* ── Video / Trace section ────────────────────────────────────────────── */
    .media-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
    .media-card {
      flex: 1; min-width: 220px; background: var(--g50);
      border: 1px solid var(--g200); border-radius: var(--radius-sm); padding: 14px;
    }
    .media-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--g500); margin-bottom: 10px; }
    .media-card video { width: 100%; max-height: 280px; border-radius: 6px; outline: none; }
    .media-link-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 600; text-decoration: none;
      transition: all .15s; margin-top: 8px;
    }
    .media-link-btn.video-btn { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .media-link-btn.video-btn:hover { background: var(--warning); color: #fff; }

<body>

<!-- ── Toolbar ─────────────────────────────────────────────────── -->
<div class="toolbar">
  <div style="flex:1">
    <div class="toolbar-brand">QA Agent Platform — Execution Report</div>
    <div class="toolbar-sub" id="tb-sub">Loading…</div>
  </div>
  <button class="tbtn" onclick="window.close()">&#8592; Back</button>
  <button class="tbtn" onclick="exportHTML()">&#8681; Export HTML</button>
  <button class="tbtn tbtn-primary" onclick="window.print()">&#128438; Export PDF</button>
</div>

<!-- ── Hero header ────────────────────────────────────────────── -->
<div class="report-hero" id="hero-header">
  <h1>Execution Report</h1>
  <p class="report-hero-sub">QA Agent Platform — Playwright</p>
</div>

<!-- ── Page content ───────────────────────────────────────────── -->
<div class="page" id="page-content">
  <div class="center-msg" id="loading-msg">Loading report…</div>
</div>

<!-- ── Screenshot modal ───────────────────────────────────────── -->
<div class="modal" id="ss-modal" onclick="modalClose(event)">
  <button class="modal-close" onclick="document.getElementById('ss-modal').classList.remove('open')">&#x2715;</button>
  <img class="modal-img" id="ss-modal-img" src="" alt="Screenshot">
</div>

<script>
// ── Bootstrap ────────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const runId  = params.get('runId');

if (!runId) {
  document.getElementById('loading-msg').textContent = 'No runId specified.';
} else {
  loadReport(runId);
}

async function loadReport(id) {
  window._runId = id;
  try {
    const res = await fetch(`/api/run/${encodeURIComponent(id)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const r = await res.json();
    renderReport(r);
  } catch (err) {
    document.getElementById('loading-msg').textContent = `Failed to load: ${err.message}`;
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch { return iso; }
}

function fmtDuration(startIso, endIso) {
  if (!startIso || !endIso) return '—';
  try {
    const ms = new Date(endIso) - new Date(startIso);
    if (ms < 0) return '—';
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s}s`;
    return `${Math.floor(s/60)}m ${s%60}s`;
  } catch { return '—'; }
}

function fmtDurationMs(ms) {
  if (!ms && ms !== 0) return '—';
  return ms >= 1000 ? `${(ms/1000).toFixed(2)}s` : `${ms}ms`;
}

function statusBadge(status) {
  const map = {
    pass:    '<span class="badge badge-pass">&#10003; Passed</span>',
    fail:    '<span class="badge badge-fail">&#10007; Failed</span>',
    running: '<span class="badge badge-run">&#9679; Running</span>',
    done:    '<span class="badge badge-done">&#10003; Completed</span>',
    failed:  '<span class="badge badge-fail">&#10007; Failed</span>',
    skip:    '<span class="badge badge-skip">&#8212; Skipped</span>',
  };
  return map[status] || `<span class="badge">${esc(status)}</span>`;
}

function extractTcId(name) {
  // Matches [MED-01], [TC-123], [ABC_01] — prefix letters + hyphen or underscore + digits
  const m = (name || '').match(/^\[([A-Z]{1,8}[-_]\d+)\]/);
  return m ? m[1] : null;
}

function cleanTitle(name) {
  // Strip leading [TCID] prefix added by codegenGenerator
  return (name || '').replace(/^\s*\[[A-Z]{1,8}[-_]\d+\]\s*/, '').trim() || name || '—';
}

function screenshotSrc(p) {
  if (!p) return '';
  return `/screenshots/${esc(p.replace('test-results/',''))}`;
}

function browserBadge(browser) {
  const b = (browser || 'chromium').toLowerCase();
  if (b === 'firefox')  return `<span class="tc-browser-badge br-firefox" >● Firefox</span>`;
  if (b === 'webkit')   return `<span class="tc-browser-badge br-webkit"  >● Safari</span>`;
  return                       `<span class="tc-browser-badge br-chromium">● Chrome</span>`;
}

// Converts a test-results/... artifact path → server-routed URL for video/trace.
// Video:  served as video/webm → browser opens natively in new tab.
// Trace:  served with Content-Disposition attachment → browser downloads as ZIP.
function artifactSrc(p) {
  if (!p) return '';
  return `/test-artifacts/${esc(p.replace('test-results/',''))}`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderReport(r) {
  const content  = document.getElementById('page-content');
  const passRate = r.total > 0 ? Math.round((r.passed / r.total) * 100) : 0;
  const dur      = fmtDuration(r.startedAt, r.finishedAt);
  const shortId  = (r.runId || '').slice(0, 8);

  document.title = `Execution Report — ${shortId}`;
  document.getElementById('tb-sub').textContent =
    `${r.suiteName || r.planId || shortId}  ·  ${fmtDate(r.startedAt)}`;

  const tests   = Array.isArray(r.tests) ? r.tests : [];
  const skipped = Math.max(0, r.total - r.passed - r.failed);

  // ── Stats dashboard ──────────────────────────────────────────────────────
  const statsHtml = `
    <div class="stats-dashboard">
      <div class="stat-card"><div class="stat-val">${r.total||0}</div><div class="stat-lbl">Total Tests</div></div>
      <div class="stat-card passed"><div class="stat-val" style="color:#16a34a">${r.passed||0}</div><div class="stat-lbl">Passed</div></div>
      <div class="stat-card failed"><div class="stat-val" style="color:#dc2626">${r.failed||0}</div><div class="stat-lbl">Failed</div></div>
      <div class="stat-card skipped"><div class="stat-val" style="color:#d97706">${skipped}</div><div class="stat-lbl">Skipped</div></div>
      <div class="stat-card rate"><div class="stat-val" style="color:#1d4ed8">${passRate}%</div><div class="stat-lbl">Pass Rate</div></div>
      <div class="stat-card"><div class="stat-val">${dur}</div><div class="stat-lbl">Duration</div></div>
    </div>`;

  // ── Meta strip ───────────────────────────────────────────────────────────
  const metaHtml = `
    <div class="meta-strip">
      <div class="meta-item"><span class="meta-lbl">Environment</span><span class="env-pill">${esc(r.environmentName||'—')}</span></div>
      <div class="meta-item"><span class="meta-lbl">Project</span><span class="browser-pill">${esc(r.projectName||'—')}</span></div>
      <div class="meta-item"><span class="meta-lbl">Suite</span><span style="font-weight:600;color:var(--dark)">${esc(r.suiteName||r.planId||'—')}</span></div>
      <div class="meta-item"><span class="meta-lbl">Run ID</span><span style="font-family:monospace;font-size:12px;color:var(--g600)">${esc(shortId)}</span></div>
      <div class="meta-item"><span class="meta-lbl">Executed By</span><span style="font-weight:600;color:var(--dark)">${esc(r.executedBy||'—')}</span></div>
      <div class="meta-item"><span class="meta-lbl">Started</span><span style="font-size:12px;color:var(--g600)">${fmtDate(r.startedAt)}</span></div>
    </div>`;

  // ── Execution Summary (mandatory preserved section) ──────────────────────
  const summaryHtml = `
    <div class="section-title">&#128203; Execution Summary</div>
    <div class="summary-grid">
      <div class="summary-item"><span class="summary-lbl">Execution ID</span><span class="summary-val" style="font-family:monospace;font-size:11px">${esc(r.runId||'—')}</span></div>
      <div class="summary-item"><span class="summary-lbl">Project</span><span class="summary-val">${esc(r.projectName||'—')}</span></div>
      <div class="summary-item"><span class="summary-lbl">Test Suite</span><span class="summary-val">${esc(r.suiteName||r.planId||'—')}</span></div>
      <div class="summary-item"><span class="summary-lbl">Environment</span><span class="summary-val">${esc(r.environmentName||'—')}</span></div>
      <div class="summary-item"><span class="summary-lbl">Executed By</span><span class="summary-val">${esc(r.executedBy||'—')}</span></div>
      <div class="summary-item"><span class="summary-lbl">Overall Status</span><span class="summary-val">${statusBadge(r.status)}</span></div>
      <div class="summary-item"><span class="summary-lbl">Start Time</span><span class="summary-val">${fmtDate(r.startedAt)}</span></div>
      <div class="summary-item"><span class="summary-lbl">End Time</span><span class="summary-val">${fmtDate(r.finishedAt)}</span></div>
      <div class="summary-item"><span class="summary-lbl">Duration</span><span class="summary-val">${dur}</span></div>
    </div>`;

  // ── Test Execution Summary (mandatory preserved section) ─────────────────
  const metricsHtml = `
    <div class="section-title">&#128202; Test Execution Summary</div>
    <div class="metrics-row">
      <div class="metric"><div class="metric-val">${r.total||0}</div><div class="metric-lbl">Total</div></div>
      <div class="metric metric-pass"><div class="metric-val">${r.passed||0}</div><div class="metric-lbl">Passed</div></div>
      <div class="metric metric-fail"><div class="metric-val">${r.failed||0}</div><div class="metric-lbl">Failed</div></div>
      <div class="metric metric-skip"><div class="metric-val">${skipped}</div><div class="metric-lbl">Skipped</div></div>
      <div class="metric metric-rate"><div class="metric-val">${passRate}%</div><div class="metric-lbl">Pass Rate</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${passRate}%"></div></div>
      <div class="progress-label">${r.passed||0} of ${r.total||0} tests passed</div>
    </div>`;

  // ── Self-Healing Events (mandatory preserved section) ────────────────────
  const healHtml = (r.healEvents && r.healEvents.length) ? `
    <div class="section-title">&#129657; Self-Healing Events
      <span class="section-title-count">${r.healEvents.length} locator${r.healEvents.length!==1?'s':''} auto-healed</span>
    </div>
    <div style="overflow-x:auto;border-radius:var(--radius);border:1px solid var(--g200);box-shadow:var(--shadow)">
      <table class="heal-table">
        <thead>
          <tr>
            <th style="width:60px">Step</th>
            <th style="width:110px">Keyword</th>
            <th>Locator Used</th>
            <th style="width:110px">Type</th>
            <th style="width:90px">Tier</th>
            <th style="width:85px">Confidence</th>
            <th style="width:130px">Healed At</th>
          </tr>
        </thead>
        <tbody>
          ${r.healEvents.map(h => {
            const conf  = h.confidence ?? 0;
            const auto  = conf >= 75;
            return `<tr>
              <td style="text-align:center;color:var(--g500)">${h.stepOrder??'—'}</td>
              <td><code style="font-size:11.5px;color:var(--primary-dk)">${esc(h.keyword||'—')}</code></td>
              <td style="font-family:monospace;font-size:11.5px;color:var(--primary);word-break:break-all">${esc(h.healed||'—')}</td>
              <td style="font-size:12px">${esc(h.healedType||'—')}</td>
              <td style="text-align:center"><span class="heal-tier ${auto?'heal-auto':'heal-rev'}">${auto?'T2/T3 Auto':'T4 Review'}</span></td>
              <td style="text-align:center;font-weight:700;font-size:12px;color:${auto?'#16a34a':'#d97706'}">${h.confidence!=null?h.confidence+'%':'—'}</td>
              <td style="font-size:11.5px;color:var(--g500);white-space:nowrap">${fmtDate(h.at)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : '';

  // ── Test Case Results (mandatory preserved + enhanced) ───────────────────
  const tcRowsHtml = tests.map((t, i) => buildTestRow(t, i, r)).join('');
  const tcHtml = `
    <div class="section-title">&#9989; Test Case Results
      <span class="section-title-count">${tests.length} test${tests.length!==1?'s':''}</span>
    </div>
    ${tests.length ? `
    <!-- Filter bar -->
    <div class="filter-bar">
      <input type="text" class="filter-search" placeholder="&#128269; Search test name…" id="tc-search" oninput="applyFilters()" />
      <div class="filter-pills">
        <div class="filter-pill active" data-status="all"   onclick="setFilter(this)">All</div>
        <div class="filter-pill pass-pill" data-status="pass" onclick="setFilter(this)">&#10003; Passed</div>
        <div class="filter-pill fail-pill" data-status="fail" onclick="setFilter(this)">&#10007; Failed</div>
        <div class="filter-pill skip-pill" data-status="skip" onclick="setFilter(this)">&#8212; Skipped</div>
      </div>
      <span class="filter-count" id="tc-count">${tests.length} shown</span>
    </div>
    <div class="tc-table-wrap">
      <table class="tc-table">
        <thead>
          <tr>
            <th style="width:36px;text-align:center">#</th>
            <th style="width:24px"></th>
            <th style="width:90px">TC ID</th>
            <th>Test Name</th>
            <th style="width:120px;text-align:center">Status</th>
            <th style="width:90px;text-align:center">Browser</th>
            <th style="width:90px;text-align:center">Duration</th>
            <th style="width:100px;text-align:center">Screenshot</th>
            <th style="width:90px;text-align:center">Video</th>
            <th style="width:90px;text-align:center">Trace</th>
            <th style="width:130px;text-align:center">Defect</th>
          </tr>
        </thead>
        <tbody id="tc-tbody">${tcRowsHtml}</tbody>
      </table>
    </div>` : '<p style="color:var(--g500);padding:20px 0">No individual test results recorded for this run.</p>'}`;

  // ── Assemble ─────────────────────────────────────────────────────────────
  content.innerHTML = `
    ${statsHtml}
    ${metaHtml}
    ${summaryHtml}
    ${metricsHtml}
    ${healHtml}
    ${tcHtml}
    <!-- Quarantined Tests Section -->
    <div id="quarantined-section" style="display:none;margin-top:28px">
      <details style="margin-bottom:20px">
        <summary style="cursor:pointer;font-size:14px;font-weight:600;color:#f48771;padding:8px 0;user-select:none;outline:none">
          ⛔ Quarantined Tests (<span id="quarantined-count">0</span>) — excluded from pass/fail
        </summary>
        <div style="margin-top:12px">
          <div style="font-size:12px;color:var(--g400);margin-bottom:12px">These tests ran but their results were <strong>NOT</strong> counted in the suite pass/fail decision.</div>
          <div class="tc-table-wrap">
            <table class="tc-table">
              <thead>
                <tr>
                  <th style="width:36px;text-align:center">#</th>
                  <th>Test Name</th>
                  <th style="width:120px;text-align:center">Result</th>
                  <th style="width:90px;text-align:center">Duration</th>
                </tr>
              </thead>
              <tbody id="quarantined-tbody"></tbody>
            </table>
          </div>
          <div id="quarantined-budget" style="margin-top:12px;font-size:12px;color:var(--g400);padding:6px 0;font-style:italic"></div>
        </div>
      </details>
    </div>
    <div class="report-footer">
      <p>QA Agent Platform — Execution Report &nbsp;|&nbsp; Run ID: <code>${esc(r.runId||'—')}</code></p>
    </div>
  `;

  // ── Populate Quarantined Section ──────────────────────────────────────────
  const quarantinedTests = (tests || []).filter(t => t.quarantined === true);
  if (quarantinedTests.length > 0) {
    const section = document.getElementById('quarantined-section');
    const countEl = document.getElementById('quarantined-count');
    const tbody   = document.getElementById('quarantined-tbody');
    const budgetEl = document.getElementById('quarantined-budget');

    if (section) section.style.display = '';
    if (countEl) countEl.textContent = quarantinedTests.length;

    if (tbody) {
      let qIndex = 0;
      tbody.innerHTML = quarantinedTests.map((t) => {
        qIndex++;
        const resultLabel = t.status === 'pass'
          ? `<span style="color:#4ec9b0;font-weight:600">PASSED</span> <span style="font-size:11px;color:var(--g400)">(quarantined)</span>`
          : `<span style="color:#f48771;font-weight:600">FAILED</span> <span style="font-size:11px;color:var(--g400)">(quarantined)</span>`;
        const dur = t.durationMs ? `${(t.durationMs/1000).toFixed(1)}s` : '—';
        return `<tr style="border-left:none">
          <td style="text-align:center;color:var(--g400);font-size:12px">${qIndex}</td>
          <td style="color:var(--dark);font-weight:500">${esc(cleanTitle(t.name))}</td>
          <td style="text-align:center">${resultLabel}</td>
          <td style="text-align:center;color:var(--g500);font-size:12px;white-space:nowrap">${dur}</td>
        </tr>`;
      }).join('');
    }

    const failedQ = quarantinedTests.filter(t => t.status === 'fail').length;
    if (budgetEl) {
      budgetEl.textContent = failedQ > 0
        ? `${failedQ} quarantined failure(s) this run — these were NOT counted toward suite failure.`
        : 'All quarantined tests passed this run.';
    }
  }
}

// ── Build one test row pair (main + detail) ───────────────────────────────────
function buildTestRow(t, i, r) {
  const tcId   = extractTcId(t.name);
  const title  = cleanTitle(t.name);
  const status = t.status === 'pass' ? 'pass' : t.status === 'fail' ? 'fail' : 'skip';
  const rowId  = `tc-${i}`;

  // ── Screenshot button — always shown; active when a path is captured ──────
  const hasSS     = !!(t.screenshotPath || t.screenshotBefore || t.screenshotAfter);
  const ssPrimary = screenshotSrc(t.screenshotAfter || t.screenshotBefore || t.screenshotPath);
  const ssCell    = hasSS
    ? `<button class="tc-btn tc-btn-ss" onclick="openModal('${ssPrimary}');event.stopPropagation()" title="View screenshot">
         &#128247; View
       </button>`
    : `<button class="tc-btn tc-btn-ss tc-btn-inactive" disabled title="No screenshot captured">
         &#128247; View
       </button>`;

  // ── Video button — always shown; active when a path is captured ───────────
  const videoCell = t.videoPath
    ? `<a class="tc-btn tc-btn-vid" href="${artifactSrc(t.videoPath)}" target="_blank"
          data-vpath="${esc(t.videoPath)}" onclick="event.stopPropagation()"
          title="Open video in new tab">&#9654; Play</a>`
    : `<button class="tc-btn tc-btn-vid tc-btn-inactive" disabled title="No video captured">
         &#9654; Play
       </button>`;

  // ── Trace button — shown only when trace exists (no disabled clutter) ─────
  const traceCell = (t.tracePath && t.testId)
    ? `<button class="tc-btn tc-btn-tr"
              onclick="event.stopPropagation();openTraceViewer(${esc(JSON.stringify(r.runId))},${esc(JSON.stringify(t.testId))},${esc(JSON.stringify(t.name))})"
              title="View trace in embedded viewer">&#128249; Trace</button>`
    : '';

  // ── Defect button — only on failed rows; badge if already filed ─────
  let defectCell = '';
  if (status === 'fail' && t.testId) {
    if (t.defectKey) {
      const cls = t.defectStatus === 'closed' ? 'defect-btn-closed' : 'defect-btn-open';
      const label = t.defectStatus === 'closed' ? 'Closed' : 'Open';
      defectCell = `<button class="defect-btn ${cls}"
        onclick="event.stopPropagation();openDefectExisting(${esc(JSON.stringify(t.defectKey))})"
        title="View defect ${esc(t.defectKey)}">&#128030; ${esc(t.defectKey)} (${label})</button>`;
    } else {
      defectCell = `<button class="defect-btn defect-btn-file"
        onclick="event.stopPropagation();openDefectModal(${esc(JSON.stringify(r.runId))},${esc(JSON.stringify(t.testId))})"
        title="File a Jira defect for this failure">&#128030; File Defect</button>`;
    }
  }

  // Detail row content
  const detailHtml = buildDetailPanel(t, i, status, r.traceMode, r.runId);

  // Auto-open failed test detail rows
  const detailOpenClass = status === 'fail' ? 'open' : '';
  const mainOpenClass   = status === 'fail' ? 'open' : '';

  return `
    <tr class="tc-main-row ${status}ed ${mainOpenClass}" data-status="${status}" data-title="${esc(title.toLowerCase())}" onclick="toggleDetail('${rowId}',this)">
      <td style="text-align:center;color:var(--g400);font-size:12px">${i+1}</td>
      <td style="text-align:center"><span class="tc-expand-icon">&#9654;</span></td>
      <td>${tcId ? `<span class="tc-id-badge">${esc(tcId)}</span>` : '<span style="color:var(--g400)">—</span>'}</td>
      <td style="color:var(--dark);font-weight:500">${esc(title)}</td>
      <td style="text-align:center">${statusBadge(status)}</td>
      <td style="text-align:center">${browserBadge(t.browser)}</td>
      <td style="text-align:center;color:var(--g500);font-size:12px;white-space:nowrap">${fmtDurationMs(t.durationMs)}</td>
      <td style="text-align:center">${ssCell}</td>
      <td style="text-align:center">${videoCell}</td>
      <td style="text-align:center">${traceCell}</td>
      <td style="text-align:center">${defectCell}</td>
    </tr>
    <tr class="tc-detail-row ${detailOpenClass}" id="detail-${rowId}">
      <td colspan="11">
        <div class="tc-detail-inner">${detailHtml}</div>
      </td>
    </tr>`;
}

// ── Build detail panel sections ───────────────────────────────────────────────
function buildDetailPanel(t, i, status, traceMode, runId) {
  const sections = [];

  // ── Error details (for failed tests) ──
  if (status === 'fail') {
    const errMsg    = esc(t.errorMessage || 'Test failed');
    const errDetail = esc(t.errorDetail  || '');
    sections.push(`
      <div class="det-section">
        <div class="det-header error-hdr" onclick="toggleDetSection(this)">
          <span class="det-arrow">&#9660;</span>
          &#9888; Error Details
        </div>
        <div class="det-body">
          <div class="error-box">
            <div class="error-msg-line">&#10007; ${errMsg}</div>
            ${errDetail ? `<div class="error-detail-pre">${errDetail}</div>` : ''}
          </div>
        </div>
      </div>`);
  }

  // ── Steps (if step data exists on TestEvent) ──
  if (t.steps && t.steps.length) {
    const stepsHtml = t.steps.map((s, si) => buildStepRow(s, i, si)).join('');
    sections.push(`
      <div class="det-section ${status !== 'fail' ? 'collapsed' : ''}">
        <div class="det-header" onclick="toggleDetSection(this)">
          <span class="det-arrow">&#9660;</span>
          &#128196; Step Details
          <span style="margin-left:auto;font-size:11px;font-weight:400;color:var(--g500)">${t.steps.length} steps</span>
        </div>
        <div class="det-body" style="padding:0">
          <div class="steps-list">${stepsHtml}</div>
        </div>
      </div>`);
  }

  // ── Visual diff strip (only when before/after pair exists; not the same as column screenshot) ──
  const hasBefore = !!t.screenshotBefore;
  const hasAfter  = !!t.screenshotAfter;
  if (hasBefore || hasAfter) {
    const beforeSrc = hasBefore ? screenshotSrc(t.screenshotBefore) : '';
    const afterSrc  = hasAfter  ? screenshotSrc(t.screenshotAfter)  : '';
    const ssContent = `
      <div class="diff-strip ${hasBefore && hasAfter ? '' : 'single'}">
        ${hasBefore ? `<div class="diff-col"><div class="diff-tag before">&#128247; Before</div>
          <img src="${beforeSrc}" alt="Before" loading="lazy" onclick="openModal('${beforeSrc}')" onerror="this.closest('.diff-col').style.display='none'"></div>` : ''}
        ${hasAfter  ? `<div class="diff-col after-col"><div class="diff-tag after">&#9888; After (Failed)</div>
          <img src="${afterSrc}" alt="After" loading="lazy" onclick="openModal('${afterSrc}')" onerror="this.closest('.diff-col').style.display='none'"></div>` : ''}
      </div>`;
    sections.push(`
      <div class="det-section ${status !== 'fail' ? 'collapsed' : ''}">
        <div class="det-header" onclick="toggleDetSection(this)">
          <span class="det-arrow">&#9660;</span>
          &#128247; Visual Diff (Before / After)
        </div>
        <div class="det-body">${ssContent}</div>
      </div>`);
  }

  // ── Failure Screenshot (Phase A: afterEach full-page capture) ──
  if (t.failureScreenshotPath) {
    const src = screenshotSrc(t.failureScreenshotPath);
    sections.push(`
      <div class="det-section">
        <div class="det-header" onclick="toggleDetSection(this)">
          <span class="det-arrow">&#9660;</span>
          &#128247; Failure Screenshot (full page)
        </div>
        <div class="det-body">
          <div class="ss-grid">
            <div class="ss-item" onclick="openModal('${src}')">
              <img class="ss-preview" src="${src}" alt="Failure Screenshot" loading="lazy" onerror="this.closest('.ss-item').style.display='none'">
              <div class="ss-label">Full-page capture at point of failure</div>
            </div>
          </div>
        </div>
      </div>`);
  }

  // ── App Warnings — hidden by default, toggle link shown only on failed tests ──
  // Console errors from the browser are always app-level noise (404s, resource errors).
  // Actual test failures (stale element, timeout, assertion) are in Error Details above.
  if (t.consoleErrors && t.consoleErrors.length && status === 'fail') {
    const warnId  = `app-warn-${i}`;
    const errRows = t.consoleErrors.map(e => `<div class="ce-row">${esc(e)}</div>`).join('');
    sections.push(`
      <div class="det-section collapsed" id="${warnId}" style="display:none">
        <div class="det-header warn-hdr" onclick="toggleDetSection(this)">
          <span class="det-arrow">&#9658;</span>
          &#9432; Browser Console Warnings (${t.consoleErrors.length})
          <span class="warn-hdr-note">— Not the cause of failure &middot; App-level noise</span>
        </div>
        <div class="det-body">
          <div class="ce-list">${errRows}</div>
        </div>
      </div>
      <div style="text-align:right;padding:4px 8px 0">
        <a href="#" class="warn-toggle-link" onclick="event.preventDefault();
          var w=document.getElementById('${warnId}');
          w.style.display=w.style.display==='none'?'block':'none';
          this.textContent=w.style.display==='none'?'Show browser warnings (${t.consoleErrors.length})':'Hide browser warnings';
        ">Show browser warnings (${t.consoleErrors.length})</a>
      </div>`);
  }

  return sections.join('') || '<div style="padding:20px;color:var(--g500);font-size:13px">No additional details available.</div>';
}

// ── Build individual step row ─────────────────────────────────────────────────
function buildStepRow(s, testIdx, stepIdx) {
  const stepId    = `step-${testIdx}-${stepIdx}`;
  const status    = s.status === 'pass' ? 'pass' : 'fail';
  const hasMeta   = s.startTime || s.durationMs || s.videoTimestamp;
  const hasSS     = !!s.screenshotPath;
  const hasErr    = status === 'fail' && s.errorMessage;
  const clickable = hasMeta || hasSS || hasErr;

  const detailContent = clickable ? `
    <div class="step-detail-panel" id="${stepId}-detail">
      ${hasMeta ? `<div class="step-meta-row">
        ${s.startTime ? `<span>&#128336; Started: ${esc(s.startTime)}</span>` : ''}
        ${s.durationMs != null ? `<span>&#9201; Duration: ${fmtDurationMs(s.durationMs)}</span>` : ''}
        ${s.videoTimestamp ? `<span>&#127916; Video: ${esc(s.videoTimestamp)}</span>` : ''}
      </div>` : ''}
      ${hasSS ? `<div style="margin-bottom:8px">
        <img class="step-ss-thumb" src="${screenshotSrc(s.screenshotPath)}" alt="Step screenshot"
             loading="lazy" onclick="openModal('${screenshotSrc(s.screenshotPath)}')"
             onerror="this.style.display='none'">
      </div>` : ''}
      ${hasErr ? `<div class="step-err-line">${esc(s.errorMessage)}</div>` : ''}
    </div>` : '';

  return `
    <div class="step-item-wrap">
      <div class="step-row ${clickable?'clickable':''} ${status==='fail'?'fail-step':''}"
           onclick="${clickable?`toggleStep('${stepId}',this)`:''}" id="${stepId}">
        <span class="step-exp-icon">${clickable?'&#9654;':''}</span>
        <span class="step-status-icon ${status}">${status==='pass'?'&#10003;':'&#10007;'}</span>
        ${s.keyword ? `<span class="step-kw">${esc(s.keyword)}</span>` : ''}
        <span class="step-name">${esc(s.description || s.name || `Step ${stepIdx+1}`)}</span>
        ${s.durationMs != null ? `<span class="step-dur">${fmtDurationMs(s.durationMs)}</span>` : ''}
      </div>
      ${detailContent}
    </div>`;
}

// ── Toggle functions ──────────────────────────────────────────────────────────
function toggleDetail(rowId, rowEl) {
  const detRow = document.getElementById(`detail-${rowId}`);
  if (!detRow) return;
  const isOpen = detRow.classList.contains('open');
  detRow.classList.toggle('open', !isOpen);
  rowEl.classList.toggle('open', !isOpen);
}

function toggleDetSection(headerEl) {
  headerEl.closest('.det-section').classList.toggle('collapsed');
}

function toggleStep(stepId, rowEl) {
  const panel = document.getElementById(`${stepId}-detail`);
  if (!panel) return;
  const open = panel.style.display === 'block';
  panel.style.display = open ? 'none' : 'block';
  rowEl.classList.toggle('expanded', !open);
}

// ── Filter ────────────────────────────────────────────────────────────────────
let _activeFilter = 'all';

function setFilter(pillEl) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  pillEl.classList.add('active');
  _activeFilter = pillEl.dataset.status;
  applyFilters();
}

function applyFilters() {
  const search = (document.getElementById('tc-search')?.value || '').toLowerCase();
  const rows   = document.querySelectorAll('#tc-tbody .tc-main-row');
  let shown = 0;
  rows.forEach(row => {
    const status  = row.dataset.status;
    const title   = row.dataset.title || '';
    const matchStatus = _activeFilter === 'all' || status === _activeFilter;
    const matchSearch = !search || title.includes(search);
    const visible = matchStatus && matchSearch;
    row.style.display = visible ? '' : 'none';
    // Also hide/show the corresponding detail row
    const detRow = row.nextElementSibling;
    if (detRow && detRow.classList.contains('tc-detail-row')) {
      detRow.style.display = visible && detRow.classList.contains('open') ? 'table-row' : visible ? '' : 'none';
      if (!visible) detRow.style.display = 'none';
    }
    if (visible) shown++;
  });
  const countEl = document.getElementById('tc-count');
  if (countEl) countEl.textContent = `${shown} shown`;
}

// ── Screenshot modal ──────────────────────────────────────────────────────────
function openModal(src) {
  if (!src) return;
  document.getElementById('ss-modal-img').src = src;
  document.getElementById('ss-modal').classList.add('open');
}

function modalClose(e) {
  if (e.target === document.getElementById('ss-modal')) {
    document.getElementById('ss-modal').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('ss-modal')?.classList.remove('open');
});

// ── HTML Export (async — embeds screenshots, graceful video/trace notes) ──────
async function exportHTML() {
  const btn      = document.querySelector('.tbtn[onclick*="exportHTML"]');
  const origHtml = btn ? btn.innerHTML : '';
  if (btn) { btn.innerHTML = '&#8987; Preparing…'; btn.disabled = true; }

  try {
    const contentEl = document.getElementById('page-content');
    const heroEl    = document.getElementById('hero-header');

    // ── 1. Collect all /screenshots/ URLs from img[src] and openModal() onclicks ──
    const serverPaths = new Set();
    contentEl.querySelectorAll('img[src^="/screenshots/"]').forEach(img =>
      serverPaths.add(img.getAttribute('src'))
    );
    contentEl.querySelectorAll('[onclick]').forEach(el => {
      const oc = el.getAttribute('onclick') || '';
      // extract every openModal('/screenshots/...') argument
      [...oc.matchAll(/openModal\('([^']+)'\)/g)].forEach(m => {
        if (m[1].startsWith('/screenshots/')) serverPaths.add(m[1]);
      });
    });

    // ── 2. Fetch each screenshot → FileReader → base64 data URI (parallel) ──
    const n = serverPaths.size;
    if (btn) btn.innerHTML = `&#8987; Embedding ${n} screenshot${n !== 1 ? 's' : ''}…`;

    const imgMap = {}; // serverPath → "data:image/..."
    await Promise.allSettled([...serverPaths].map(async src => {
      try {
        const res = await fetch(src);
        if (!res.ok) return;
        const blob = await res.blob();
        imgMap[src] = await new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload  = () => resolve(r.result);
          r.onerror = reject;
          r.readAsDataURL(blob);
        });
      } catch { /* screenshot fetch failed — img will be absent in export */ }
    }));

    // ── 3. Clone the rendered page DOM ───────────────────────────────────────
    if (btn) btn.innerHTML = '&#8987; Building file…';
    const clone = contentEl.cloneNode(true);

    // ── 4. Swap img[src] server paths → embedded data URIs ──────────────────
    clone.querySelectorAll('img[src^="/screenshots/"]').forEach(img => {
      const src = img.getAttribute('src');

<script>
// ── Defect Modal (live page) ─────────────────────────────────────────

let _defectDraft = null;

async function openDefectModal(runId, testId) {
  const m = document.getElementById('defect-modal');
  const body = document.getElementById('defect-modal-body');
  const footer = document.getElementById('defect-modal-footer');
  m.hidden = false;
  body.innerHTML = '⏳ Loading draft…';
  footer.innerHTML = '';
  let draft;
  try {
    const r = await fetch('/api/defects/draft', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ runId, testId }),
    });

  } catch (e) {
    body.innerHTML = '<div class="defect-banner-error">✗ ' + esc2(e.message) + '</div>';
    footer.innerHTML = '<button class="btn" onclick="closeDefectModal()">Close</button>';
    return;

  _defectDraft = { runId, testId, draft };

  if (draft.existingDefect) {

      '<a href="' + esc2(d.jiraUrl) + '" target="_blank" rel="noopener">Open in Jira ↗</a></div>' +

    footer.innerHTML =
      '<button class="btn" onclick="closeDefectModal()">Cancel</button>' +
      '<button class="btn btn-primary" onclick="commentOnExisting(' + esc2(JSON.stringify(d.defectKey)) + ')">Add as Comment</button>';
    return;

  if (!draft.config) {
    body.innerHTML = '<div class="defect-banner-error">✗ Jira not configured. Ask an admin to configure mapping in Admin → Notification Settings.</div>';
    footer.innerHTML = '<button class="btn" onclick="closeDefectModal()">Close</button>';
    return;
  }

  const cfg = draft.config;
  const attachRows = (draft.attachments || []).map(function(a) {
    var sizeMb = (a.sizeBytes/1024/1024).toFixed(2);
    var disabled = a.tooLarge ? 'disabled' : 'checked';

      '<input type="checkbox" class="defect-attach" data-kind="' + esc2(a.kind) + '" ' + disabled + '> ' +
      esc2(a.kind) + ' — ' + esc2(a.name) + ' (' + sizeMb + ' MB)' + note +

  body.innerHTML =
    '<div class="defect-section"><h4>Project Key</h4>' +
      '<input id="dfx-project-key" type="text" value="' + esc2(cfg.projectKey || '') + '" readonly></div>' +
    '<div class="defect-section"><h4>Issue Type</h4>' +
      '<input id="dfx-issue-type" type="text" value="' + esc2(cfg.issueType || 'Defect') + '" readonly></div>' +
    '<div class="defect-section"><h4>Priority *</h4>' +

function adfPreview(adf) {
  if (!adf || !adf.content) return '';
  const lines = [];
  for (const node of adf.content) {
    if (node.type === 'heading') lines.push('\n## ' + (node.content && node.content[0] && node.content[0].text || ''));
    else if (node.type === 'paragraph') lines.push((node.content || []).map(c => c.text || '').join(''));
    else if (node.type === 'orderedList') (node.content || []).forEach((li, i) => {
      const txt = li.content && li.content[0] && li.content[0].content && li.content[0].content[0] && li.content[0].content[0].text || '';
      lines.push((i+1) + '. ' + txt);
    });
    else if (node.type === 'codeBlock') lines.push('```\n' + (node.content && node.content[0] && node.content[0].text || '') + '\n```');
  }
  return lines.join('\n');
}

async function approveAndFile() {
  if (!_defectDraft) return;
  const parent = document.getElementById('dfx-parent').value.trim();
  if (!/^[A-Z][A-Z0-9_]+-\d+$/.test(parent)) {
    document.getElementById('dfx-msg').innerHTML = '<span style="color:#dc2626">User Story key must look like ABC-123</span>';
    return;
  }
  const summary  = document.getElementById('dfx-summary').value.trim();
  if (!summary) { document.getElementById('dfx-msg').innerHTML = '<span style="color:#dc2626">Summary required</span>'; return; }
  const priority = document.getElementById('dfx-priority').value;
  const attachKinds = Array.from(document.querySelectorAll('.defect-attach'))
    .filter(c => c.checked && !c.disabled).map(c => c.dataset.kind);

  document.getElementById('dfx-msg').textContent = '⏳ Filing…';
  const r = await fetch('/api/defects/file', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      runId: _defectDraft.runId, testId: _defectDraft.testId,
      summary, descriptionADF: _defectDraft.draft.descriptionADF,
      priority, parentStoryKey: parent, attachKinds,
    }),
  });
  const j = await r.json();
  const msg = document.getElementById('dfx-msg');
  if (r.ok) {
    msg.innerHTML = '<div class="defect-banner-ok">✓ Filed as <strong>' + esc2(j.defectKey) + '</strong>. ' +
      '<a href="' + esc2(j.jiraUrl) + '" target="_blank" rel="noopener">Open in Jira ↗</a></div>';
    document.getElementById('defect-modal-footer').innerHTML =
      '<button class="btn btn-primary" onclick="location.reload()">Close & Refresh</button>';
  } else if (r.status === 409) {
    const existing = j && j.error && j.error.details || {};
    msg.innerHTML = '<div class="defect-banner-warn">⚠ Already filed as <strong>' + esc2(existing.defectKey) + '</strong>. ' +
      '<a href="' + esc2(existing.jiraUrl) + '" target="_blank" rel="noopener">Open in Jira ↗</a></div>';
  } else {
    msg.innerHTML = '<div class="defect-banner-error">✗ ' + esc2(j && j.error && j.error.message || 'File failed') + '</div>';
  }
}

async function commentOnExisting(defectKey) {
  if (!_defectDraft) return;
  document.getElementById('defect-modal-body').innerHTML = '⏳ Posting comment…';
  const r = await fetch('/api/defects/comment', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      defectKey, runId: _defectDraft.runId, testId: _defectDraft.testId,
      attachKinds: ['screenshot'],
    }),
  });
  const j = await r.json();
  const body = document.getElementById('defect-modal-body');
  if (r.ok) body.innerHTML = '<div class="defect-banner-ok">✓ Comment posted on ' + esc2(defectKey) + '</div>';
  else body.innerHTML = '<div class="defect-banner-error">✗ ' + esc2(j && j.error && j.error.message || 'Comment failed') + '</div>';
  document.getElementById('defect-modal-footer').innerHTML = '<button class="btn btn-primary" onclick="closeDefectModal()">Close</button>';
}

async function dismissDefectFromModal() {
  if (!_defectDraft) return;
  const cat = document.getElementById('dfx-dismiss-cat').value;
  if (!cat) { document.getElementById('dfx-msg').innerHTML = '<span style="color:#dc2626">Pick a category</span>'; return; }
  const r = await fetch('/api/defects/dismiss', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ runId: _defectDraft.runId, testId: _defectDraft.testId, category: cat }),
  });
  const body = document.getElementById('defect-modal-body');
  if (r.ok) body.innerHTML = '<div class="defect-banner-ok">✓ Logged as: ' + esc2(cat) + '</div>';
  else body.innerHTML = '<div class="defect-banner-error">✗ Dismiss failed</div>';
  document.getElementById('defect-modal-footer').innerHTML = '<button class="btn btn-primary" onclick="closeDefectModal()">Close</button>';
}

function openDefectExisting(defectKey) {
  const m = document.getElementById('defect-modal');
  const body = document.getElementById('defect-modal-body');
  const footer = document.getElementById('defect-modal-footer');
  m.hidden = false;
  body.innerHTML = '<p>Defect <strong>' + esc2(defectKey) + '</strong> is filed for this test.</p>' +
    '<p>Use the link below to open it in Jira.</p>';
  footer.innerHTML =
    '<button class="btn" onclick="closeDefectModal()">Close</button>' +
    '<a class="btn btn-primary" href="/api/defects/open/' + encodeURIComponent(defectKey) + '" target="_blank" rel="noopener">Open in Jira ↗</a>';
}

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Escape') return;
  const dm = document.getElementById('defect-modal');
  if (dm && !dm.hidden) closeDefectModal();
});
</script>
</body>
</html>
