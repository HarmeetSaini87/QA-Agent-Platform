<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Hammer handle -->
  <line x1="9" y1="23" x2="17" y2="15" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hammer head -->
  <rect x="15" y="7" width="10" height="6" rx="1.5" fill="#000" transform="rotate(45 20 10)"/>
  <!-- Spark lines -->
  <line x1="25" y1="6"  x2="28" y2="3"  stroke="#000" stroke-width="1.2" stroke-linecap="round" opacity=".6"/>
  <line x1="27" y1="10" x2="30" y2="10" stroke="#000" stroke-width="1.2" stroke-linecap="round" opacity=".6"/>
  <line x1="24" y1="13" x2="27" y2="16" stroke="#000" stroke-width="1.2" stroke-linecap="round" opacity=".6"/>
</svg>
